name: Douyin Scraper - Daily 11AM

on:
  schedule:
    - cron: '0 4 * * *'   # 4:00 UTC = 11:00 Việt Nam (UTC+7)
  workflow_dispatch:         # Cho phép chạy thủ công từ GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      CI: "true"
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Write cookie from Secret
        run: echo '${{ secrets.DOUYIN_COOKIES }}' > douyin_cookies.json

      - name: Run scraper
        run: python douyin_scraper.py

      - name: Upload output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: douyin-output-${{ github.run_id }}
          path: douyin_output/
          retention-days: 7
